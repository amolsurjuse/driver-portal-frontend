syntax = "proto3";

package electrahub.auth.v1;

option java_multiple_files = true;
option java_package = "com.electrahub.proto.auth.v1";
option java_outer_classname = "AuthProto";

import "electrahub/common/v1/common.proto";

// ─── Auth Service ───────────────────────────────────────────────────────────

service AuthService {
  // Authenticate user and return access + refresh tokens
  rpc Login(LoginRequest) returns (AuthResponse);

  // Register a new user and return access + refresh tokens
  rpc Register(RegisterRequest) returns (AuthResponse);

  // Refresh an expired access token using a refresh token
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);

  // Logout current device (invalidate refresh token for this device)
  rpc LogoutDevice(LogoutDeviceRequest) returns (LogoutResponse);

  // Logout all devices (invalidate all refresh tokens for this user)
  rpc LogoutAll(LogoutAllRequest) returns (LogoutResponse);

  // List all supported countries
  rpc ListCountries(ListCountriesRequest) returns (ListCountriesResponse);
}

// ─── Request Messages ───────────────────────────────────────────────────────

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  string phone_number = 5;
  electrahub.common.v1.Address address = 6;
}

message RefreshTokenRequest {
  string refresh_token = 1;   // The __Host-rt cookie value
  string device_id = 2;       // The did cookie value
}

message LogoutDeviceRequest {
  string device_id = 1;
}

message LogoutAllRequest {
  string user_id = 1;
  string jwt_id = 2;
  int64 token_expiry_epoch = 3;
}

message ListCountriesRequest {}

// ─── Response Messages ──────────────────────────────────────────────────────

message AuthResponse {
  string access_token = 1;
  string token_type = 2;            // "Bearer"
  string refresh_token = 3;         // Returned to be set as cookie by gateway
  string device_id = 4;             // Returned to be set as cookie by gateway
}

message LogoutResponse {}

message ListCountriesResponse {
  repeated Country countries = 1;
}

message Country {
  string code = 1;
  string name = 2;
  string dial_code = 3;
}
