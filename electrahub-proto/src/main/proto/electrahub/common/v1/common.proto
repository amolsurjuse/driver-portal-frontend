syntax = "proto3";

package electrahub.common.v1;

option java_multiple_files = true;
option java_package = "com.electrahub.proto.common.v1";
option java_outer_classname = "CommonProto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

// ─── Pagination ─────────────────────────────────────────────────────────────

message PageRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message PageInfo {
  int64 total = 1;
  int32 limit = 2;
  int32 offset = 3;
  int32 current_page = 4;
  int32 total_pages = 5;
  bool has_next = 6;
  bool has_previous = 7;
}

// ─── Address ────────────────────────────────────────────────────────────────

message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string postal_code = 4;
  string country_iso_code = 5;
}

// ─── Error Detail ───────────────────────────────────────────────────────────

message ErrorDetail {
  string code = 1;
  string message = 2;
  string field = 3;
}

// ─── Money (for BigDecimal financial values) ────────────────────────────────

// Represents a decimal value as a string to preserve precision.
// gRPC does not have a native decimal type, so we use string representation.
message DecimalValue {
  string value = 1;  // e.g. "19.99", "0.00"
}
