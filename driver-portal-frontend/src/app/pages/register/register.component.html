<section class="auth-shell">
  <div class="auth-hero">
    <h1>Make the most of your driver account</h1>
    <p>Create a secure identity to access device sessions, policy updates, and operations tools.</p>
    <ul class="hero-list">
      <li>Secure device-bound refresh tokens</li>
      <li>Centralized session controls</li>
      <li>Built for high-trust workflows</li>
    </ul>
  </div>

  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h2>Join now</h2>

    <div class="grid">
      <label>
        First name
      <input type="text" formControlName="firstName" placeholder="Avery" />
      </label>
      <label>
        Last name
      <input type="text" formControlName="lastName" placeholder="Nguyen" />
      </label>
    </div>

    <label>
      Email
      <input type="email" formControlName="email" placeholder="you@company.com" />
    </label>

    <label>
      Country
      <select formControlName="countryIsoCode">
        <option value="" disabled>Select a country</option>
        <option *ngFor="let country of (countries$ | async)" [value]="country.code">
          {{ country.name }}
        </option>
      </select>
    </label>

    <label>
      Phone number
      <div class="phone-input-wrap">
        <span class="phone-dial-code">{{ (phoneDialCode$ | async) || '+' }}</span>
        <input type="tel" formControlName="phoneNumber" placeholder="4155550101" />
      </div>
    </label>

    <label>
      Password
      <div class="password-wrap">
        <input [type]="passwordVisible() ? 'text' : 'password'" formControlName="password" placeholder="Minimum 8 characters" />
        <button class="password-toggle" type="button" (click)="togglePasswordVisibility()" tabindex="-1" aria-label="Toggle password visibility">
          <svg *ngIf="!passwordVisible()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="passwordVisible()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </button>
      </div>
    </label>

    <div class="grid">
      <label>
        Street
      <input type="text" formControlName="street" placeholder="125 Market Street" />
      </label>
      <label>
        City
      <input type="text" formControlName="city" placeholder="San Francisco" />
      </label>
    </div>

    <div class="grid">
      <label>
        State
        <input type="text" formControlName="state" placeholder="CA" />
      </label>
      <label>
        Postal code
        <input type="text" formControlName="postalCode" placeholder="94105" />
      </label>
    </div>

    <div class="error" *ngIf="(error$ | async) as error">
      <span class="error-icon">✕</span>
      {{ error }}
    </div>

    <button type="submit" [disabled]="form.invalid || (loading$ | async)" class="submit-btn">
      <span class="spinner" *ngIf="(loading$ | async)"></span>
      {{ (loading$ | async) ? 'Creating account...' : 'Join now' }}
    </button>
    <p class="hint">Already on Electra Hub? <a routerLink="/login">Sign in</a>.</p>
  </form>
</section>
