<section class="auth-shell">
  <header class="signin-header">
    <div class="signin-brand">
      <img class="signin-wordmark" src="/electra-hub-logo-dark.svg" alt="Electra Hub" />
      <span class="signin-portal-label">Driver Portal</span>
    </div>
    <p class="signin-header-copy">Secure driver sign in</p>
  </header>

  <div class="auth-hero">
    <h1>Welcome back</h1>
    <p>Sign in to manage driver identity, sessions, and secure access across devices.</p>
    <div class="hero-card">
      <div class="chip">Trusted access</div>
      <h3>Security that scales</h3>
      <p>Built for production: device-bound refresh tokens and instant session control.</p>
    </div>
  </div>

  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h2>Sign in</h2>
    <label>
      Email
      <input type="email" formControlName="email" placeholder="you@company.com" />
    </label>
    <label>
      Password
      <div class="password-wrap">
        <input [type]="passwordVisible() ? 'text' : 'password'" formControlName="password" placeholder="Your password" />
        <button class="password-toggle" type="button" (click)="togglePasswordVisibility()" tabindex="-1" aria-label="Toggle password visibility">
          <svg *ngIf="!passwordVisible()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="passwordVisible()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </button>
      </div>
    </label>

    <div class="error" *ngIf="(error$ | async) as error">
      <span class="error-icon">✕</span>
      {{ error }}
    </div>

    <button type="submit" [disabled]="form.invalid || (loading$ | async)" class="submit-btn">
      <span class="spinner" *ngIf="(loading$ | async)"></span>
      {{ (loading$ | async) ? 'Signing in...' : 'Sign in' }}
    </button>
    <p class="hint">New here? <a routerLink="/register">Join now</a>.</p>
  </form>
</section>
