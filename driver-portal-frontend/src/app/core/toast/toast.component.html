<div class="toast-container" aria-live="polite">
  <div *ngFor="let toast of toastService.toasts()" class="toast-item" [ngClass]="'toast-' + toast.type">
    <span class="toast-icon">{{ icon(toast.type) }}</span>
    <span class="toast-message">{{ toast.message }}</span>
    <button class="toast-close" type="button" (click)="dismiss(toast.id)" aria-label="Dismiss">&times;</button>
  </div>
</div>
